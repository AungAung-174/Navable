<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClearPath — Navigator Mode</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #1a1a1a;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    /* ── TOP BAR ── */
    #top-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 20px;
    }

    #back-btn {
      position: absolute;
      left: 0;
      background-color: #FFC107;
      border: 2px solid #FFC107;
      border-radius: 8px;
      color: #1a1a1a;
      font-size: 22px;
      cursor: pointer;

      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;

      padding: 0;
    }

    #back-btn:hover
    {
      transform: translateY(-3px);
      box-shadow: 4px 4px 4px black;
      color: black;
    }
    
    #top-title {
      color: #4CAF50;
      font-size: 18px;
      font-weight: bold;
    }

    #page-title {
      color: #FFC107;
      font-size: 20px;
      font-weight: bold;
    }

    /* ── VOICEOVER CONTROLS ── */
    #voiceover-box {
      background-color: #2a2a2a;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
    }

    #voiceover-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    #voiceover-title {
      font-size: 16px;
      font-weight: bold;
      color: white;
    }

    /*#speaker-btn {
      background-color: #4CAF50;
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }*/

    #volume-btns {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .vol-btn {
      background-color: #2a2a2a;
      border: 2px solid #444;
      border-radius: 8px;
      padding: 12px;
      color: white;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .vol-btn.active {
      background-color: #FFC107;
      color: #1a1a1a;
      border-color: #FFC107;
    }

    /* ── DIRECTION BOX ── */
    #direction-box {
      background-color: #2a2a2a;
      border-radius: 20px;
      padding: 40px 24px;
      text-align: center;
      margin-bottom: 16px;
    }

    #direction-arrow {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    #direction-text {
      font-size: 24px;
      font-weight: bold;
      color: #FFC107;
      margin-bottom: 6px;
    }

    #direction-sub {
      font-size: 14px;
      color: white;
    }

    /* ── HAZARD BANNER ── */
    #hazard-banner {
      background-color: #D32F2F;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      display: none;
    }

    #hazard-banner.visible {
      display: flex;
    }

    #hazard-banner-text {
      color: #FFC107;
      font-size: 15px;
      font-weight: bold;
    }

    /* ── 4 ACTION BUTTONS ── */
    #buttons-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .action-btn {
      background-color: #2a2a2a;
      border: none;
      border-radius: 16px;
      padding: 28px 12px;
      color: #FFC107;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
    }

    .action-btn:active {
      background-color: #FFB300;
    }

    .action-btn .icon {
      font-size: 26px;
      display: block;
      margin-bottom: 8px;
    }

    /* screen reader only */
    #hazard-announcement {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
    }
    .action-btn.speaking {
        outline: 3px solid #FFC107;
        outline-offset: 2px;
        background-color: #3a3a3a;
    }

    .vol-btn.contrast-active {
        outline: 3px solid #1a1a1a;
        outline-offset: 2px;
    }
    /* ── SEARCH BOX ── */
    #search-box {
      background-color: #2a2a2a;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    #search-title {
      font-size: 14px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }

    #search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    #destination-input {
      flex: 1;
      background-color: #1a1a1a;
      border: 2px solid #444;
      border-radius: 10px;
      padding: 12px 14px;
      color: white;
      font-size: 15px;
      font-family: Arial, sans-serif;
      outline: none;
    }

    #destination-input:focus {
      border-color: #FFC107;
    }

    #destination-input::placeholder {
      color: #666;
    }

    #mic-btn {
      background-color: #1a1a1a;
      border: 2px solid #444;
      border-radius: 10px;
      width: 48px;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #mic-btn.listening {
      border-color: #FF5252;
      background-color: #3a0000;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%   { opacity: 1; }
      50%  { opacity: 0.5; }
      100% { opacity: 1; }
    }

    #search-results {
      display: none;
      background-color: #1a1a1a;
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .search-result-item {
      padding: 12px 14px;
      font-size: 14px;
      color: white;
      cursor: pointer;
      border-bottom: 1px solid #333;
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .search-result-item:hover {
      background-color: #2a2a2a;
    }

    #go-btn {
      width: 100%;
      background-color: #FFC107;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      color: #1a1a1a;
      cursor: pointer;
    }

    #go-btn:disabled {
      background-color: #444;
      color: #888;
      cursor: not-allowed;
    }

    #go-btn:active {
      background-color: #E6AC00;
    }
  </style>
</head>
<body>

  <div id="hazard-announcement" aria-live="assertive" aria-atomic="true"></div>

  <!-- Top bar -->
  <div id="top-bar">
    <button id="back-btn" aria-label="Go back" onclick="history.back()">🏠︎</button>
    <span id="top-title">Voice Navigator Active</span>
  </div>

  <!-- Voiceover controls -->
  <div id="voiceover-box">
    <div id="voiceover-header">
      <span id="voiceover-title">Voiceover Controls</span>
      <!--<button id="speaker-btn" aria-label="Toggle voice" onclick="toggleVoice()">🔊</button>-->
    </div>
    <div id="volume-btns">
      <button class="vol-btn" id="vol-low"
        aria-label="Minimal alerts"
        onclick="setFrequency('low')">Minimal</button>
        <button class="vol-btn" id="vol-medium"
        aria-label="Normal alerts"
        onclick="setFrequency('medium')">Normal</button>
        <button class="vol-btn active" id="vol-high"
        aria-label="All alerts"
        onclick="setFrequency('high')">All Alerts</button>
    </div>
  </div>

  <!-- Destination search -->
  <div id="search-box">
    <div id="search-title">Where to?</div>
    <div id="search-row">
      <input type="text"
           id="destination-input"
           placeholder="Enter destination..."
           aria-label="Enter destination"
           oninput="onSearchInput(this.value)" />
      <button id="mic-btn"
            aria-label="Voice input"
            onclick="startVoiceInput()">🎤</button>
    </div>
    <div id="search-results"></div>
    <button id="go-btn"
          aria-label="Start navigation"
          onclick="startNavigation()"
          disabled>
    Go →
    </button>
  </div>

<!-- Map -->
  <div id="map" style="height: 40vh; width: 100%; border-radius: 16px; margin-bottom: 16px;"></div>

<!-- Direction card -->
  <div id="direction-box" role="status" aria-label="Current direction">
    <span id="direction-arrow">↓</span>
    <div id="direction-text">Waiting for route...</div>
    <div id="direction-sub">Following accessible route</div>
  </div>


  <!-- Hazard banner (hidden until triggered) -->
  <div id="hazard-banner" role="alert">
    <span>⚠️</span>
    <span id="hazard-banner-text">Cracked sidewalk — 80 ft ahead</span>
  </div>

  <!-- 4 quick-action buttons -->
  <div id="buttons-grid">
    <button class="action-btn"
            aria-label="Repeat directions"
            onclick="repeatDirection()">
      <span class="icon">🔉</span>
      Repeat directions
    </button>

    <button class="action-btn"
            aria-label="What's nearby"
            onclick="whatsNearby()">
      <span class="icon">📍</span>
      What's nearby
    </button>

    <button class="action-btn"
            aria-label="Report hazard here"
            onclick="window.location.href='report.html'">
      <span class="icon">⚠️</span>
      Report hazard here
    </button>

    <button class="action-btn"
            aria-label="Call for help"
            onclick="callForHelp()">
      <span class="icon">📞</span>
      Call for help
    </button>
  </div>

  <script src="js/config.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/map2.js"></script>
  <script>
    async function loadGoogleMaps() {
      const res = await fetch(`${API_BASE}/config/maps`);
      const config = await res.json();
      const script = document.createElement("script");
      script.src = `https://maps.googleapis.com/maps/api/js?key=${config.googleMapsApiKey}&libraries=geometry&callback=initMap`;
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    }
    loadGoogleMaps();
  </script>
  <script>
    let lastDirection = "Waiting for route...";
    let voiceEnabled = true;
    let currentVolume = 1.0;
    let selectedDestination = null;
    let recognition = null;

// ── SEARCH INPUT ─────────────────────────────────────
    function onSearchInput(value) {
      if (value.length < 2) {
        document.getElementById("search-results").style.display = "none";
        document.getElementById("go-btn").disabled = true;
        selectedDestination = null;
        return;
      }
  // Google Places Autocompleteと連携（APIキーがあれば）
  // 今はデモ用にモック結果を表示
      showMockResults(value);
    }

    function showMockResults(query) {
      const results = document.getElementById("search-results");
      results.innerHTML = "";
      results.style.display = "block";

  // デモ用のサンプル場所（実際はGoogle Places APIから取得）
      const mockPlaces = [
        "Kelley Engineering Center, OSU",
        "Valley Library, OSU",
        "Memorial Union, OSU",
        "Dixon Recreation Center, OSU",
        "Weatherford Hall, OSU",
      ].filter(p => p.toLowerCase().includes(query.toLowerCase()));

      if (mockPlaces.length === 0) {
        results.style.display = "none";
        return;
      }

      mockPlaces.forEach(place => {
        const item = document.createElement("div");
        item.className = "search-result-item";
        item.textContent = place;
        item.onclick = () => selectDestination(place);
        results.appendChild(item);
      });
    }

    function selectDestination(place) {
      selectedDestination = place;
      document.getElementById("destination-input").value = place;
      document.getElementById("search-results").style.display = "none";
      document.getElementById("go-btn").disabled = false;
      if (voiceEnabled) speakAlert("Destination set to " + place);
    }

// ── VOICE INPUT ──────────────────────────────────────
    function startVoiceInput() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        speakAlert("Voice input is not supported on this browser.");
        return;
      }
     
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      const micBtn = document.getElementById("mic-btn");
      micBtn.classList.add("listening");
      micBtn.textContent = "⏹";
      if (voiceEnabled) speakAlert("Listening. Say your destination.");

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById("destination-input").value = transcript;
        onSearchInput(transcript);
        if (voiceEnabled) speakAlert("I heard: " + transcript);
      };

      recognition.onend = () => {
        micBtn.classList.remove("listening");
        micBtn.textContent = "🎤";
      };

      recognition.onerror = () => {
        micBtn.classList.remove("listening");
        micBtn.textContent = "🎤";
        if (voiceEnabled) speakAlert("Could not hear you. Please try again.");
      };

      recognition.start();
    }

// ── START NAVIGATION ─────────────────────────────────
    function startNavigation() {
      if (!selectedDestination) return;
      if (voiceEnabled) speakAlert("Starting navigation to " + selectedDestination);
      setDirection("Head toward " + selectedDestination, "↑");
  // 実際はGoogle Maps Directions APIと連携してルートを取得
    }

    function setFrequency(level) {
      currentVolume = level;
      localStorage.setItem("alertFrequency", level);

      ["low", "medium", "high"].forEach(l => {
        document.getElementById("vol-" + l).classList.toggle("active", l === level);
      });

    // contrastがオンなら色を再適用
      const contrast = localStorage.getItem("highContrast") === "true";
      if (contrast) {
        document.querySelectorAll(".vol-btn").forEach(el => {
          el.style.color = "white";
          el.style.backgroundColor = "#2a2a2a";
          el.style.borderColor = "#FFC107";
          el.style.outline = "2px solid #FFC107";
        });
        document.querySelectorAll(".vol-btn.active").forEach(el => {
          el.style.color = "#1a1a1a";
          el.style.backgroundColor = "#FFC107";
        });
      }

      const labels = {
        low:    "Minimal alerts. High urgency hazards only.",
        medium: "Normal alerts. High and medium urgency hazards.",
        high:   "All alerts. Every hazard will be announced.",
      };

      if(voiceEnabled){
        speakAlert(labels[level]);
      }
    }

    function toggleVoice() {
      voiceEnabled = !voiceEnabled;
      document.getElementById("speaker-btn").textContent = voiceEnabled ? "🔊" : "🔇";
      if (voiceEnabled) speakAlert("Voice alerts on");
    }

    function setDirection(text, arrow = "↓") {
      lastDirection = text;
      document.getElementById("direction-text").textContent = text;
      document.getElementById("direction-arrow").textContent = arrow;
      if (voiceEnabled) speakDirection(text);
    }

    function showHazardBanner(text) {
      document.getElementById("hazard-banner-text").textContent = text;
      document.getElementById("hazard-banner").classList.add("visible");
      const announcement = document.getElementById("hazard-announcement");
      if (announcement) announcement.textContent = text;
      if (voiceEnabled) speakAlert(text);
    }

    function highlightBtn(btn, durationMs) {
        btn.classList.add("speaking");
        setTimeout(() => btn.classList.remove("speaking"), durationMs);
    }

    function estimateDuration(text) {
  // 平均的な読み上げ速度: 約130words/min = 約450ms/word
        const words = text.split(" ").length;
        return words * 450;
    }

    function repeatDirection() {
        if (!voiceEnabled) return;
        const btn = document.querySelector('[aria-label="Repeat directions"]');
        const duration = estimateDuration(lastDirection);
        highlightBtn(btn, duration);
        speakAlert(lastDirection);
    }

    function whatsNearby() {
        const btn = document.querySelector('[aria-label="What\'s nearby"]');
        let text;
        if (!window.hazards || window.hazards.length === 0) {
            text = "No hazards reported nearby.";
        } else {
            const count = window.hazards.length;
            text = count + " hazards nearby. Nearest: " + window.hazards[0].alert_text;
        }
        const duration = estimateDuration(text);
        highlightBtn(btn, duration);
        if (voiceEnabled) speakAlert(text);
    }

    function callForHelp() {
        const btn = document.querySelector('[aria-label="Call for help"]');
        const text = "Calling for help. Please stay where you are.";
        highlightBtn(btn, estimateDuration(text));
        speakAlert(text);
    }

    window.addEventListener("load", () => {
  // Load settings from localStorage
        const contrast  = localStorage.getItem("highContrast") === "true";
        const largeText = localStorage.getItem("largeText")    === "true";
        const frequency = localStorage.getItem("alertFrequency") || "high";

        voiceEnabled = localStorage.getItem("voiceAlerts") !== "false";
  // Apply high contrast
        if (contrast) {
            document.body.style.backgroundColor = "#1a1a1a";
            document.body.style.color = "#1a1a1a";
            document.body.style.fontWeight = "bold";
            document.querySelectorAll("*").forEach(el => {
                el.style.fontWeight = "bold";
            });
            document.getElementById("search-box").style.backgroundColor = "#E6AC00";
            document.getElementById("search-title").style.color = "#333";
            document.getElementById("destination-input").style.backgroundColor = "#1a1a1a";
            document.getElementById("destination-input").style.color = "white";
            document.getElementById("destination-input").style.borderColor = "#1a1a1a";
            document.getElementById("mic-btn").style.backgroundColor = "#1a1a1a";
            document.getElementById("mic-btn").style.borderColor = "#1a1a1a";
            document.getElementById("go-btn").style.backgroundColor = "#1a1a1a";
            document.getElementById("go-btn").style.color = "#FFC107";
    // Invert button colors
            document.querySelectorAll(".action-btn").forEach(el => {
                el.style.backgroundColor = "#E6AC00";
                el.style.color = "#1a1a1a";
            });
            document.getElementById("voiceover-box").style.backgroundColor = "#E6AC00";
            document.getElementById("voiceover-title").style.color ="#1a1a1a";
            document.getElementById("direction-box").style.backgroundColor = "#E6AC00";
            document.getElementById("direction-text").style.color = "#1a1a1a";
            document.getElementById("direction-sub").style.color = "#333";
            document.getElementById("hazard-banner").style.backgroundColor = "#8B0000"
            document.getElementById("top-title").style.color = "#1a1a1a";
            document.getElementById("back-btn").style.color = "white";
            document.querySelectorAll(".vol-btn").forEach(el => {
                el.style.color ="white";
                el.style.backgroundColor = "#2a2a2a";
                el.style.borderColor = "#FFC107";
                el.style.outline = "2px solid #FFC107";
                el.style.outlineOffset = "2px";
            })
            document.querySelectorAll(".vol-btn.active").forEach(el => {
                el.style.color = "#1a1a1a";
                el.style.backgroundColor = "#FFC107";
            });
        }

  // Apply large text
        if (largeText) {
            document.querySelectorAll(".action-btn").forEach(el => {
                el.style.fontSize = "18px";
            });
            document.getElementById("direction-text").style.fontSize = "30px";
            document.getElementById("voiceover-title").style.fontSize = "20px";
        }

  // Apply frequency
        setFrequency(frequency);

        watchUserLocation();
    });
  </script>

</body>
</html>
