<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSU Hackathon 2026</title>
    <link rel="stylesheet" href="styles/home.css">
</head>
<body>
    <div class="screen" id="screen-home">
        <header>
            <h1 class="app-title">Navable</h1>
            <div class="logo"><img src="images/logo.png"></div>
        </header>

        <div class="home-content">
            <a href="navigator.html" class="card" style="text-decoration: none;">
                <div class="icon-box">♿︎</div>
                <h2 class="card-title">Wheelchair User</h2>
                <p class="card-description">Insert Description</p>
            </a>

            <a href="navigator.html" class="card" style="text-decoration: none;">
                    <div class="icon-box">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </div>
                <h2 class="card-title">Visually Impaired</h2>
                <p class="card-description">Insert Description</p>
            </a>

            <a href="navigator.html" class="card" style="text-decoration: none;">
                <div class="icon-box">⚑</div>
                <h2 class="card-title">Report Hazard</h2>
                <p class="card-description">Insert Descriptions</p>
            </a>

            <div class="settings-container">
                <a href="settings.html" class="settings-card" style="text-decoration: none;">
                <div class="icon-box">⚙︎</div>
                <h2 class="card-title">Settings</h2>
            </a>
            </div>
        </div>
    </div>

    <script>
        function showScreen(id)
        {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            const target = document.getElementById(id);
            if (target)
            {
                target.classList.remove('hidden');
                window.scrollTo(0,0);
            }
        }
    </script>
</body>
</html>
